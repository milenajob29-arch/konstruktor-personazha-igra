<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ BLESS - Конструктор чиби-героинь ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #ffd1e4 0%, #ffb5c0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 240, 245, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(255, 150, 200, 0.4);
            border: 3px solid white;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 5em;
            background: linear-gradient(135deg, #ff69b4, #ff9f9f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 3px 3px 0 white;
            letter-spacing: 5px;
        }
        
        .header h1 span {
            font-size: 0.5em;
            background: white;
            -webkit-text-fill-color: #ff69b4;
            padding: 0 20px;
            border-radius: 50px;
        }
        
        .subtitle {
            color: #ff69b4;
            font-size: 1.3em;
            font-weight: bold;
            text-shadow: 2px 2px 0 white;
        }
        
        .gender-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .gender-btn {
            padding: 15px 50px;
            font-size: 1.8em;
            border: 4px solid white;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
        }
        
        .gender-btn.female {
            background: linear-gradient(135deg, #ff85b3, #ffb5c0);
        }
        
        .gender-btn.male {
            background: linear-gradient(135deg, #85b3ff, #b5c0ff);
        }
        
        .gender-btn.selected {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 rgba(0,0,0,0.1);
        }
        
        .main-area {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 20px;
        }
        
        @media (max-width: 1000px) {
            .main-area {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 20px;
            border: 4px solid white;
            box-shadow: 0 10px 0 rgba(255, 105, 180, 0.3);
        }
        
        .panel h2 {
            color: #ff69b4;
            font-size: 1.8em;
            margin-bottom: 20px;
            border-bottom: 4px dotted #ffb5c0;
            padding-bottom: 10px;
            text-shadow: 2px 2px 0 white;
        }
        
        .character-display {
            background: linear-gradient(135deg, #ffe6f0, #fff0f5);
            border-radius: 60px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 6px solid white;
            box-shadow: 0 20px 0 #ffb5c0;
        }
        
        .character-canvas {
            width: 100%;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 40px;
        }
        
        .character-svg {
            width: 100%;
            height: 100%;
            max-width: 300px;
        }
        
        .character-name {
            font-size: 2em;
            margin-top: 20px;
            color: #ff69b4;
            text-shadow: 3px 3px 0 white;
            background: white;
            padding: 10px 30px;
            border-radius: 60px;
            border: 4px solid #ffb5c0;
            font-weight: bold;
        }
        
        .option-section {
            margin-bottom: 20px;
        }
        
        .option-section h3 {
            color: #ff69b4;
            margin-bottom: 10px;
            font-size: 1.2em;
            text-shadow: 1px 1px 0 white;
        }
        
        .option-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        
        .option-btn {
            background: white;
            border: 3px solid #ffb5c0;
            color: #ff69b4;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9em;
            font-weight: bold;
            box-shadow: 0 3px 0 #ffb5c0;
        }
        
        .option-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 0 #ff69b4;
        }
        
        .option-btn.selected {
            background: #ff69b4;
            border-color: white;
            color: white;
            box-shadow: 0 3px 0 #ff3388;
        }
        
        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 5px;
        }
        
        .color-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 3px solid white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 3px 0 rgba(0,0,0,0.1);
        }
        
        .color-btn:hover {
            transform: scale(1.1);
        }
        
        .color-btn.selected {
            border-color: #ff69b4;
            transform: scale(1.1);
            box-shadow: 0 0 10px #ff69b4;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        
        .action-btn {
            padding: 12px;
            border: none;
            border-radius: 40px;
            background: #ff85b3;
            color: white;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            transition: 0.2s;
            border: 3px solid white;
            box-shadow: 0 5px 0 #ff3388;
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #ff3388;
        }
        
        .action-btn.secondary {
            background: #b5c0ff;
            box-shadow: 0 5px 0 #8590cc;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BLESS <span>✨</span></h1>
            <div class="subtitle">милые чиби-героини</div>
        </div>
        
        <div class="gender-selector">
            <button class="gender-btn female selected" id="genderFemale">👸 Девочка</button>
            <button class="gender-btn male" id="genderMale">👦 Мальчик</button>
        </div>
        
        <div class="main-area">
            <!-- Левая панель - Внешность -->
            <div class="panel">
                <h2>🎀 Внешность</h2>
                
                <div class="option-section">
                    <h3>Тип героини</h3>
                    <div class="option-buttons" id="roleButtons"></div>
                </div>
                
                <div class="option-section">
                    <h3>Прическа</h3>
                    <div class="option-buttons" id="hairstyleButtons"></div>
                </div>
                
                <div class="option-section">
                    <h3>Цвет волос</h3>
                    <div class="color-palette" id="hairColorPalette"></div>
                </div>
                
                <div class="option-section">
                    <h3>Цвет глаз</h3>
                    <div class="color-palette" id="eyeColorPalette"></div>
                </div>
                
                <div class="option-section">
                    <h3>Выражение</h3>
                    <div class="option-buttons" id="faceButtons"></div>
                </div>
            </div>
            
            <!-- Центр - Персонаж -->
            <div class="character-display">
                <div class="character-canvas">
                    <svg class="character-svg" viewBox="0 0 300 450" id="characterSVG"></svg>
                </div>
                <div class="character-name" id="characterName">✨ Принцесса ✨</div>
            </div>
            
            <!-- Правая панель - Снаряжение -->
            <div class="panel">
                <h2>⭐ Снаряжение</h2>
                
                <div class="option-section">
                    <h3>Оружие</h3>
                    <div class="option-buttons" id="weaponButtons"></div>
                </div>
                
                <div class="option-section">
                    <h3>Наряд</h3>
                    <div class="option-buttons" id="outfitButtons"></div>
                </div>
                
                <div class="option-section">
                    <h3>Головной убор</h3>
                    <div class="option-buttons" id="hatButtons"></div>
                </div>
                
                <div class="option-section">
                    <h3>Эффекты</h3>
                    <div class="option-buttons" id="effectButtons"></div>
                </div>
                
                <!-- Кнопки -->
                <div class="action-buttons">
                    <button class="action-btn" id="randomizeBtn">🎲 Случайная</button>
                    <button class="action-btn secondary" id="resetBtn">🔄 Сброс</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Состояние персонажа
        let character = {
            gender: 'female',
            role: 'princess',
            hairstyle: 'long',
            hairColor: '#F4C430',
            eyeColor: '#4a90e2',
            face: 'happy',
            weapon: 'wand',
            outfit: 'princess',
            hat: 'none',
            effect: 'none'
        };
        
        // Данные для кнопок
        const buttonsData = {
            roles: [
                { id: 'princess', name: '👑 Принцесса' },
                { id: 'mage', name: '✨ Чародейка' },
                { id: 'warrior', name: '⚔️ Воин' },
                { id: 'hunter', name: '🏹 Лучница' },
                { id: 'angel', name: '😇 Ангел' }
            ],
            hairstyles: [
                { id: 'long', name: 'Длинные' },
                { id: 'twintails', name: 'Хвостики' },
                { id: 'short', name: 'Короткие' },
                { id: 'braid', name: 'Коса' },
                { id: 'bob', name: 'Каре' }
            ],
            faces: [
                { id: 'happy', name: '😊 Улыбка' },
                { id: 'wink', name: '😉 Подмиг' },
                { id: 'heart', name: '😍 Сердечки' },
                { id: 'star', name: '✨ Звезды' }
            ],
            weapons: [
                { id: 'wand', name: '✨ Палочка' },
                { id: 'staff', name: '🔮 Посох' },
                { id: 'bow', name: '🏹 Лук' },
                { id: 'sword', name: '⚔️ Меч' },
                { id: 'heart', name: '💖 Сердечко' }
            ],
            outfits: [
                { id: 'princess', name: '👗 Платье' },
                { id: 'magic', name: '✨ Магическое' },
                { id: 'armor', name: '🛡️ Доспехи' }
            ],
            hats: [
                { id: 'none', name: '🚫 Нет' },
                { id: 'crown', name: '👑 Корона' },
                { id: 'ribbon', name: '🎀 Бантик' },
                { id: 'witchhat', name: '🧙 Шляпа' },
                { id: 'flowers', name: '🌸 Цветы' }
            ],
            effects: [
                { id: 'none', name: 'Нет' },
                { id: 'sparkles', name: '✨ Блестки' },
                { id: 'hearts', name: '💖 Сердечки' },
                { id: 'stars', name: '⭐ Звезды' },
                { id: 'flowers', name: '🌸 Цветы' }
            ]
        };
        
        // Цвета
        const hairColors = [
            '#F4C430', // золотой
            '#8B4513', // каштан
            '#2C2C2C', // черный
            '#D2691E', // рыжий
            '#FF69B4', // розовый
            '#9370DB', // фиолетовый
            '#4169E1', // синий
            '#C0C0C0'  // серебро
        ];
        
        const eyeColors = [
            '#4a90e2', // голубой
            '#32CD32', // зеленый
            '#8B4513', // карий
            '#9370DB', // фиолетовый
            '#FF69B4', // розовый
            '#FFD700'  // золотой
        ];
        
        // Создание кнопок
        function createButtons() {
            // Роли
            const roleContainer = document.getElementById('roleButtons');
            buttonsData.roles.forEach(role => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${character.role === role.id ? 'selected' : ''}`;
                btn.setAttribute('data-role', role.id);
                btn.textContent = role.name;
                btn.onclick = () => {
                    document.querySelectorAll('[data-role]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.role = role.id;
                    updateCharacter();
                };
                roleContainer.appendChild(btn);
            });
            
            // Прически
            const hairContainer = document.getElementById('hairstyleButtons');
            buttonsData.hairstyles.forEach(style => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${character.hairstyle === style.id ? 'selected' : ''}`;
                btn.setAttribute('data-hairstyle', style.id);
                btn.textContent = style.name;
                btn.onclick = () => {
                    document.querySelectorAll('[data-hairstyle]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.hairstyle = style.id;
                    updateCharacter();
                };
                hairContainer.appendChild(btn);
            });
            
            // Выражения лица
            const faceContainer = document.getElementById('faceButtons');
            buttonsData.faces.forEach(face => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${character.face === face.id ? 'selected' : ''}`;
                btn.setAttribute('data-face', face.id);
                btn.textContent = face.name;
                btn.onclick = () => {
                    document.querySelectorAll('[data-face]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.face = face.id;
                    updateCharacter();
                };
                faceContainer.appendChild(btn);
            });
            
            // Оружие
            const weaponContainer = document.getElementById('weaponButtons');
            buttonsData.weapons.forEach(weapon => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${character.weapon === weapon.id ? 'selected' : ''}`;
                btn.setAttribute('data-weapon', weapon.id);
                btn.textContent = weapon.name;
                btn.onclick = () => {
                    document.querySelectorAll('[data-weapon]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.weapon = weapon.id;
                    updateCharacter();
                };
                weaponContainer.appendChild(btn);
            });
            
            // Наряды
            const outfitContainer = document.getElementById('outfitButtons');
            buttonsData.outfits.forEach(outfit => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${character.outfit === outfit.id ? 'selected' : ''}`;
                btn.setAttribute('data-outfit', outfit.id);
                btn.textContent = outfit.name;
                btn.onclick = () => {
                    document.querySelectorAll('[data-outfit]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.outfit = outfit.id;
                    updateCharacter();
                };
                outfitContainer.appendChild(btn);
            });
            
            // Головные уборы
            const hatContainer = document.getElementById('hatButtons');
            buttonsData.hats.forEach(hat => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${character.hat === hat.id ? 'selected' : ''}`;
                btn.setAttribute('data-hat', hat.id);
                btn.textContent = hat.name;
                btn.onclick = () => {
                    document.querySelectorAll('[data-hat]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.hat = hat.id;
                    updateCharacter();
                };
                hatContainer.appendChild(btn);
            });
            
            // Эффекты
            const effectContainer = document.getElementById('effectButtons');
            buttonsData.effects.forEach(effect => {
                const btn = document.createElement('button');
                btn.className = `option-btn ${character.effect === effect.id ? 'selected' : ''}`;
                btn.setAttribute('data-effect', effect.id);
                btn.textContent = effect.name;
                btn.onclick = () => {
                    document.querySelectorAll('[data-effect]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.effect = effect.id;
                    updateCharacter();
                };
                effectContainer.appendChild(btn);
            });
        }
        
        // Создание цветовых палитр
        function createColorPalettes() {
            const hairPalette = document.getElementById('hairColorPalette');
            const eyePalette = document.getElementById('eyeColorPalette');
            
            hairColors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = `color-btn ${character.hairColor === color ? 'selected' : ''}`;
                btn.style.backgroundColor = color;
                btn.onclick = () => {
                    document.querySelectorAll('#hairColorPalette .color-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.hairColor = color;
                    updateCharacter();
                };
                hairPalette.appendChild(btn);
            });
            
            eyeColors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = `color-btn ${character.eyeColor === color ? 'selected' : ''}`;
                btn.style.backgroundColor = color;
                btn.onclick = () => {
                    document.querySelectorAll('#eyeColorPalette .color-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.eyeColor = color;
                    updateCharacter();
                };
                eyePalette.appendChild(btn);
            });
        }
        
        // Отрисовка персонажа
        function drawCharacter() {
            const svg = document.getElementById('characterSVG');
            
            let svgContent = `
                <svg viewBox="0 0 300 450">
                    <!-- Тело -->
                    <ellipse cx="150" cy="320" rx="50" ry="60" fill="${getOutfitColor()}" />
                    
                    <!-- Голова -->
                    <circle cx="150" cy="180" r="85" fill="#FFE0C0" stroke="white" stroke-width="3"/>
                    
                    <!-- Ушки -->
                    <circle cx="80" cy="155" r="15" fill="#FFE0C0" stroke="white" stroke-width="2"/>
                    <circle cx="220" cy="155" r="15" fill="#FFE0C0" stroke="white" stroke-width="2"/>
                    
                    <!-- Румянец -->
                    <circle cx="110" cy="210" r="18" fill="#FFB6C1" opacity="0.4"/>
                    <circle cx="190" cy="210" r="18" fill="#FFB6C1" opacity="0.4"/>
            `;
            
            // Волосы
            svgContent += getHairstyle();
            
            // Глаза
            svgContent += getEyes();
            
            // Рот
            svgContent += getMouth();
            
            // Брови
            svgContent += `
                <path d="M100,160 L130,150" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M200,160 L170,150" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>
            `;
            
            // Наряд
            svgContent += getOutfit();
            
            // Оружие
            svgContent += getWeapon();
            
            // Головной убор
            svgContent += getHat();
            
            // Эффекты
            svgContent += getEffect();
            
            svgContent += `</svg>`;
            
            svg.innerHTML = svgContent;
        }
        
        function getHairstyle() {
            const color = character.hairColor;
            switch(character.hairstyle) {
                case 'long':
                    return `<path d="M90,100 Q150,160 210,100" fill="${color}" opacity="0.9"/>
                            <path d="M100,120 L150,260 L200,120" fill="${color}" opacity="0.8"/>`;
                case 'twintails':
                    return `<circle cx="100" cy="120" r="30" fill="${color}"/>
                            <circle cx="200" cy="120" r="30" fill="${color}"/>`;
                case 'short':
                    return `<path d="M100,100 Q150,130 200,100" fill="${color}"/>`;
                case 'braid':
                    return `<path d="M110,100 Q130,120 150,130 Q170,120 190,100" fill="${color}"/>`;
                case 'bob':
                    return `<rect x="100" y="90" width="100" height="40" rx="20" fill="${color}"/>`;
                default:
                    return `<path d="M90,100 Q150,140 210,100" fill="${color}"/>`;
            }
        }
        
        function getEyes() {
            const color = character.eyeColor;
            if (character.face === 'wink') {
                return `
                    <ellipse cx="110" cy="195" rx="18" ry="22" fill="white" stroke="#8B4513" stroke-width="2"/>
                    <ellipse cx="190" cy="195" rx="18" ry="22" fill="white" stroke="#8B4513" stroke-width="2"/>
                    <circle cx="110" cy="200" r="10" fill="${color}"/>
                    <circle cx="100" cy="190" r="3" fill="white"/>
                    <line x1="180" y1="190" x2="200" y2="180" stroke="black" stroke-width="3"/>
                `;
            } else {
                return `
                    <ellipse cx="110" cy="195" rx="18" ry="22" fill="white" stroke="#8B4513" stroke-width="2"/>
                    <ellipse cx="190" cy="195" rx="18" ry="22" fill="white" stroke="#8B4513" stroke-width="2"/>
                    <circle cx="110" cy="200" r="10" fill="${color}"/>
                    <circle cx="190" cy="200" r="10" fill="${color}"/>
                    <circle cx="100" cy="190" r="3" fill="white"/>
                    <circle cx="180" cy="190" r="3" fill="white"/>
                `;
            }
        }
        
        function getMouth() {
            switch(character.face) {
                case 'happy':
                    return `<path d="M130,240 Q150,260 170,240" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>`;
                case 'heart':
                    return `<text x="140" y="240" font-size="30">❤️</text>`;
                case 'star':
                    return `<text x="140" y="240" font-size="30">✨</text>`;
                default:
                    return `<path d="M130,240 Q150,250 170,240" stroke="black" stroke-width="4" fill="none"/>`;
            }
        }
        
        function getOutfit() {
            switch(character.outfit) {
                case 'princess':
                    return `<rect x="120" y="280" width="60" height="80" fill="#FFB6C1" rx="20"/>`;
                case 'magic':
                    return `<rect x="120" y="280" width="60" height="80" fill="#9370DB" rx="20"/>`;
                case 'armor':
                    return `<rect x="120" y="280" width="60" height="80" fill="#C0C0C0" rx="10"/>`;
                default:
                    return `<rect x="120" y="280" width="60" height="80" fill="#98FB98" rx="20"/>`;
            }
        }
        
        function getOutfitColor() {
            switch(character.outfit) {
                case 'princess': return '#FFB6C1';
                case 'magic': return '#9370DB';
                case 'armor': return '#C0C0C0';
                default: return '#98FB98';
            }
        }
        
        function getWeapon() {
            switch(character.weapon) {
                case 'wand':
                    return `<line x1="230" y1="200" x2="260" y2="150" stroke="#FFD700" stroke-width="5"/>
                            <circle cx="265" cy="145" r="8" fill="#FF69B4"/>`;
                case 'staff':
                    return `<rect x="230" y="180" width="6" height="80" fill="#8B4513"/>
                            <circle cx="233" cy="170" r="12" fill="#9370DB"/>`;
                case 'bow':
                    return `<path d="M220,200 Q240,220 220,240" stroke="#8B4513" stroke-width="5" fill="none"/>`;
                case 'sword':
                    return `<rect x="230" y="190" width="5" height="70" fill="#C0C0C0"/>
                            <polygon points="230,170 235,170 232.5,150" fill="#C0C0C0"/>`;
                case 'heart':
                    return `<text x="230" y="200" font-size="35">💖</text>`;
                default:
                    return '';
            }
        }
        
        function getHat() {
            switch(character.hat) {
                case 'crown':
                    return `<path d="M120,60 L150,30 L180,60" stroke="#FFD700" stroke-width="5" fill="none"/>
                            <circle cx="150" cy="35" r="6" fill="#FFD700"/>`;
                case 'ribbon':
                    return `<rect x="130" y="70" width="40" height="12" fill="#FF69B4" rx="6"/>
                            <rect x="140" y="60" width="20" height="15" fill="#FF69B4" rx="5"/>`;
                case 'witchhat':
                    return `<polygon points="120,70 180,70 150,30" fill="#2C2C2C"/>`;
                case 'flowers':
                    return `<circle cx="130" cy="65" r="8" fill="#FF69B4"/>
                            <circle cx="170" cy="65" r="8" fill="#FFD700"/>`;
                default:
                    return '';
            }
        }
        
        function getEffect() {
            switch(character.effect) {
                case 'sparkles':
                    return `<text x="30" y="100" font-size="25">✨</text>
                            <text x="250" y="100" font-size="25">✨</text>`;
                case 'hearts':
                    return `<text x="30" y="150" font-size="25">💖</text>
                            <text x="250" y="150" font-size="25">💖</text>`;
                case 'stars':
                    return `<text x="30" y="200" font-size="25">⭐</text>
                            <text x="250" y="200" font-size="25">⭐</text>`;
                case 'flowers':
                    return `<text x="30" y="250" font-size="25">🌸</text>
                            <text x="250" y="250" font-size="25">🌸</text>`;
                default:
                    return '';
            }
        }
        
        // Обновление имени
        function updateName() {
            const names = {
                princess: '✨ Принцесса ✨',
                mage: '🔮 Чародейка 🔮',
                warrior: '⚔️ Воительница ⚔️',
                hunter: '🏹 Лучница 🏹',
                angel: '😇 Ангел 😇'
            };
            document.getElementById('characterName').textContent = names[character.role] || '✨ Героиня ✨';
        }
        
        // Обновление всего персонажа
        function updateCharacter() {
            drawCharacter();
            updateName();
        }
        
        // Кнопки выбора пола
        document.getElementById('genderFemale').onclick = () => {
            document.getElementById('genderFemale').classList.add('selected');
            document.getElementById('genderMale').classList.remove('selected');
            character.gender = 'female';
            updateCharacter();
        };
        
        document.getElementById('genderMale').onclick = () => {
            document.getElementById('genderMale').classList.add('selected');
            document.getElementById('genderFemale').classList.remove('selected');
            character.gender = 'male';
            updateCharacter();
        };
        
        // Случайный персонаж
        document.getElementById('randomizeBtn').onclick = () => {
            const roles = ['princess', 'mage', 'warrior', 'hunter', 'angel'];
            const hairstyles = ['long', 'twintails', 'short', 'braid', 'bob'];
            const faces = ['happy', 'wink', 'heart', 'star'];
            const weapons = ['wand', 'staff', 'bow', 'sword', 'heart'];
            const outfits = ['princess', 'magic', 'armor'];
            const hats = ['none', 'crown', 'ribbon', 'witchhat', 'flowers'];
            const effects = ['none', 'sparkles', 'hearts', 'stars', 'flowers'];
            
            character.role = roles[Math.floor(Math.random() * roles.length)];
            character.hairstyle = hairstyles[Math.floor(Math.random() * hairstyles.length)];
            character.hairColor = hairColors[Math.floor(Math.random() * hairColors.length)];
            character.eyeColor = eyeColors[Math.floor(Math.random() * eyeColors.length)];
            character.face = faces[Math.floor(Math.random() * faces.length)];
            character.weapon = weapons[Math.floor(Math.random() * weapons.length)];
            character.outfit = outfits[Math.floor(Math.random() * outfits.length)];
            character.hat = hats[Math.floor(Math.random() * hats.length)];
            character.effect = effects[Math.floor(Math.random() * effects.length)];
            
            // Обновляем выделение кнопок
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelectorAll(`[data-role="${character.role}"]`).forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll(`[data-hairstyle="${character.hairstyle}"]`).forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll(`[data-face="${character.face}"]`).forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll(`[data-weapon="${character.weapon}"]`).forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll(`[data-outfit="${character.outfit}"]`).forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll(`[data-hat="${character.hat}"]`).forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll(`[data-effect="${character.effect}"]`).forEach(btn => btn.classList.add('selected'));
            
            // Обновляем цветовые палитры
            document.querySelectorAll('#hairColorPalette .color-btn').forEach(btn => {
                if (btn.style.backgroundColor === character.hairColor) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
            
            document.querySelectorAll('#eyeColorPalette .color-btn').forEach(btn => {
                if (btn.style.backgroundColor === character.eyeColor) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
            
            updateCharacter();
        };
        
        // Сброс
        document.getElementById('resetBtn').onclick = () => {
            character = {
                gender: 'female',
                role: 'princess',
                hairstyle: 'long',
                hairColor: '#F4C430',
                eyeColor: '#4a90e2',
                face: 'happy',
                weapon: 'wand',
                outfit: 'princess',
                hat: 'none',
                effect: 'none'
            };
            
            // Обновляем выделение кнопок
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
            document.querySelectorAll('[data-role="princess"]').forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll('[data-hairstyle="long"]').forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll('[data-face="happy"]').forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll('[data-weapon="wand"]').forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll('[data-outfit="princess"]').forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll('[data-hat="none"]').forEach(btn => btn.classList.add('selected'));
            document.querySelectorAll('[data-effect="none"]').forEach(btn => btn.classList.add('selected'));
            
            // Обновляем цветовые палитры
            document.querySelectorAll('#hairColorPalette .color-btn').forEach(btn => {
                if (btn.style.backgroundColor === '#F4C430') {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
            
            document.querySelectorAll('#eyeColorPalette .color-btn').forEach(btn => {
                if (btn.style.backgroundColor === '#4a90e2') {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');
                }
            });
            
            document.getElementById('genderFemale').click();
            updateCharacter();
        };
        
        // Инициализация
        createButtons();
        createColorPalettes();
        updateCharacter();
    </script>
</body>
</html>
