<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👸 КОНСТРУКТОР ГЕРОИНЬ - Создай свою идеальную чародейку</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #1a0b2e 0%, #2d1b3a 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        
        h1 {
            text-align: center;
            font-size: 3.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #ffd7b0, #ff9f9f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255,200,200,0.5);
        }
        
        .subtitle {
            text-align: center;
            color: #d4b5ff;
            margin-bottom: 30px;
            font-size: 1.2em;
            font-style: italic;
        }
        
        .gender-selector {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 30px;
        }
        
        .gender-btn {
            padding: 15px 50px;
            font-size: 1.5em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            color: white;
        }
        
        .gender-btn.female {
            background: linear-gradient(135deg, #ff6b6b, #ff9f9f);
            box-shadow: 0 10px 30px rgba(255,107,107,0.5);
        }
        
        .gender-btn.male {
            background: linear-gradient(135deg, #6b8cff, #9fb0ff);
            box-shadow: 0 10px 30px rgba(107,140,255,0.5);
        }
        
        .gender-btn.selected {
            transform: scale(1.1);
            border: 3px solid white;
        }
        
        .main-area {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 20px;
        }
        
        @media (max-width: 1000px) {
            .main-area {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        
        .panel h2 {
            color: #ffd7b0;
            margin-bottom: 20px;
            font-size: 1.5em;
            border-bottom: 2px solid rgba(255,215,176,0.3);
            padding-bottom: 10px;
        }
        
        .character-display {
            background: linear-gradient(135deg, #2d1b3a, #1e1326);
            border-radius: 40px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px solid rgba(255,215,176,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            min-height: 600px;
        }
        
        .character-canvas {
            width: 100%;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .character-svg {
            max-width: 100%;
            max-height: 100%;
            filter: drop-shadow(0 10px 20px rgba(255,200,200,0.3));
        }
        
        .character-name {
            font-size: 2em;
            margin-top: 20px;
            color: #ffd7b0;
            text-shadow: 0 0 20px #ff9f9f;
            background: rgba(0,0,0,0.3);
            padding: 10px 40px;
            border-radius: 50px;
            border: 1px solid rgba(255,215,176,0.3);
        }
        
        .option-section {
            margin-bottom: 25px;
        }
        
        .option-section h3 {
            color: #d4b5ff;
            margin-bottom: 10px;
            font-size: 1.1em;
        }
        
        .option-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .option-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9em;
        }
        
        .option-btn:hover {
            background: rgba(255,215,176,0.3);
            transform: translateY(-2px);
        }
        
        .option-btn.selected {
            background: linear-gradient(135deg, #ff6b6b, #ff9f9f);
            border-color: white;
        }
        
        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .color-btn {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .color-btn:hover {
            transform: scale(1.2);
            border-color: white;
        }
        
        .color-btn.selected {
            border-color: white;
            box-shadow: 0 0 20px currentColor;
        }
        
        .stats-panel {
            margin-top: 20px;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
        }
        
        .stat-name {
            color: #d4b5ff;
        }
        
        .stat-value {
            color: #ffd7b0;
            font-weight: bold;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        
        .action-btn {
            padding: 12px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #6b8cff, #9fb0ff);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(107,140,255,0.4);
        }
        
        .action-btn.secondary {
            background: linear-gradient(135deg, #ff6b6b, #ff9f9f);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👸 КОНСТРУКТОР ГЕРОИНЬ</h1>
        <div class="subtitle">Создай свою идеальную чародейку, воительницу или правительницу</div>
        
        <div class="gender-selector">
            <button class="gender-btn female selected" id="genderFemale">👸 Женский</button>
            <button class="gender-btn male" id="genderMale">👑 Мужской</button>
        </div>
        
        <div class="main-area">
            <!-- Левая панель - Внешность -->
            <div class="panel">
                <h2>✨ Внешность</h2>
                
                <div class="option-section">
                    <h3>Тип героини</h3>
                    <div class="option-buttons" id="roleButtons">
                        <button class="option-btn selected" data-role="queen">👑 Правительница</button>
                        <button class="option-btn" data-role="warrior">⚔️ Воительница</button>
                        <button class="option-btn" data-role="mage">🔮 Чародейка</button>
                        <button class="option-btn" data-role="hunter">🏹 Охотница</button>
                    </div>
                </div>
                
                <div class="option-section">
                    <h3>Прическа</h3>
                    <div class="option-buttons" id="hairstyleButtons">
                        <button class="option-btn selected" data-hairstyle="long">Длинные</button>
                        <button class="option-btn" data-hairstyle="medium">Средние</button>
                        <button class="option-btn" data-hairstyle="ponytail">Хвост</button>
                        <button class="option-btn" data-hairstyle="braid">Коса</button>
                    </div>
                </div>
                
                <div class="option-section">
                    <h3>Цвет волос</h3>
                    <div class="color-palette" id="hairColorPalette"></div>
                </div>
                
                <div class="option-section">
                    <h3>Цвет глаз</h3>
                    <div class="color-palette" id="eyeColorPalette"></div>
                </div>
            </div>
            
            <!-- Центр - Персонаж -->
            <div class="character-display">
                <div class="character-canvas">
                    <svg class="character-svg" viewBox="0 0 300 500" id="characterSVG">
                        <!-- Здесь будет отрисовываться персонаж -->
                    </svg>
                </div>
                <div class="character-name" id="characterName">Правительница</div>
            </div>
            
            <!-- Правая панель - Снаряжение -->
            <div class="panel">
                <h2>⚔️ Снаряжение</h2>
                
                <div class="option-section">
                    <h3>Оружие</h3>
                    <div class="option-buttons" id="weaponButtons">
                        <button class="option-btn selected" data-weapon="sword">🗡️ Меч</button>
                        <button class="option-btn" data-weapon="staff">🔮 Посох</button>
                        <button class="option-btn" data-weapon="bow">🏹 Лук</button>
                        <button class="option-btn" data-weapon="dagger">🔪 Кинжал</button>
                    </div>
                </div>
                
                <div class="option-section">
                    <h3>Доспехи</h3>
                    <div class="option-buttons" id="armorButtons">
                        <button class="option-btn selected" data-armor="royal">👑 Королевские</button>
                        <button class="option-btn" data-armor="battle">⚔️ Боевые</button>
                        <button class="option-btn" data-armor="magic">✨ Магические</button>
                        <button class="option-btn" data-armor="hunter">🏹 Охотничьи</button>
                    </div>
                </div>
                
                <div class="option-section">
                    <h3>Аксессуары</h3>
                    <div class="option-buttons" id="accessoryButtons">
                        <button class="option-btn selected" data-accessory="none">Нет</button>
                        <button class="option-btn" data-accessory="crown">👑 Корона</button>
                        <button class="option-btn" data-accessory="cape">🧙 Плащ</button>
                        <button class="option-btn" data-accessory="jewelry">💎 Украшения</button>
                    </div>
                </div>
                
                <!-- Характеристики -->
                <div class="stats-panel">
                    <h3>📊 Характеристики</h3>
                    <div class="stat-row">
                        <span class="stat-name">👑 Власть</span>
                        <span class="stat-value" id="statPower">15</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">⚔️ Сила</span>
                        <span class="stat-value" id="statStrength">12</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">🔮 Магия</span>
                        <span class="stat-value" id="statMagic">10</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">🏹 Ловкость</span>
                        <span class="stat-value" id="statAgility">8</span>
                    </div>
                </div>
                
                <!-- Кнопки -->
                <div class="action-buttons">
                    <button class="action-btn" id="randomizeBtn">🎲 Случайная</button>
                    <button class="action-btn secondary" id="resetBtn">🔄 Сброс</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Состояние персонажа
        const character = {
            gender: 'female',
            role: 'queen',
            hairstyle: 'long',
            hairColor: '#F4C430', // золотистый
            eyeColor: '#4a90e2', // голубой
            weapon: 'sword',
            armor: 'royal',
            accessory: 'none'
        };
        
        // Цвета
        const hairColors = [
            '#2C2C2C', // черный
            '#8B4513', // каштановый
            '#F4C430', // блонд
            '#D2691E', // рыжий
            '#C0C0C0', // седой
            '#8A2BE2', // фиолетовый
            '#FF69B4', // розовый
            '#4169E1'  // синий
        ];
        
        const eyeColors = [
            '#4a90e2', // голубой
            '#32CD32', // зеленый
            '#8B4513', // карий
            '#9370DB', // фиолетовый
            '#DC143C', // красный
            '#FFD700'  // золотой
        ];
        
        // Функция отрисовки персонажа
        function drawCharacter() {
            const svg = document.getElementById('characterSVG');
            
            // Определяем цвета
            const skinColor = '#FFDBB5';
            const hairColor = character.hairColor;
            const eyeColor = character.eyeColor;
            
            // Базовая фигура
            let svgContent = `
                <!-- Тени и свечение -->
                <defs>
                    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="${skinColor}"/>
                        <stop offset="100%" stop-color="#F0C8A0"/>
                    </linearGradient>
                    
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                
                <!-- Шея -->
                <rect x="130" y="140" width="40" height="60" fill="url(#skinGradient)" rx="15"/>
                
                <!-- Тело (зависит от доспехов) -->
                ${getBodyForArmor()}
                
                <!-- Голова -->
                <circle cx="150" cy="120" r="40" fill="url(#skinGradient)" filter="url(#glow)"/>
            `;
            
            // Волосы
            svgContent += getHairForStyle();
            
            // Лицо
            svgContent += `
                <!-- Глаза -->
                <circle cx="135" cy="115" r="6" fill="white"/>
                <circle cx="165" cy="115" r="6" fill="white"/>
                <circle cx="137" cy="117" r="3" fill="${eyeColor}"/>
                <circle cx="167" cy="117" r="3" fill="${eyeColor}"/>
                <circle cx="138" cy="119" r="1.5" fill="black"/>
                <circle cx="168" cy="119" r="1.5" fill="black"/>
                
                <!-- Брови -->
                <path d="M130,105 L140,100" stroke="black" stroke-width="2" fill="none"/>
                <path d="M170,105 L160,100" stroke="black" stroke-width="2" fill="none"/>
                
                <!-- Рот -->
                <path d="M145,130 Q150,135 155,130" stroke="black" stroke-width="2" fill="none"/>
            `;
            
            // Оружие
            svgContent += getWeaponForType();
            
            // Аксессуары
            svgContent += getAccessoryForType();
            
            svg.innerHTML = svgContent;
        }
        
        // Функция для тела
        function getBodyForArmor() {
            switch(character.armor) {
                case 'royal':
                    return `<rect x="120" y="190" width="60" height="180" fill="#8B4513" rx="20"/>
                            <rect x="125" y="195" width="50" height="170" fill="#D4AF37" rx="15"/>
                            <path d="M120,190 L180,190 L170,210 L130,210 Z" fill="#D4AF37"/>`;
                case 'battle':
                    return `<rect x="120" y="190" width="60" height="180" fill="#C0C0C0" rx="10"/>
                            <rect x="125" y="195" width="50" height="170" fill="#A9A9A9" rx="8"/>
                            <circle cx="150" cy="220" r="15" fill="#CD7F32"/>`;
                case 'magic':
                    return `<rect x="120" y="190" width="60" height="180" fill="#4B0082" rx="20"/>
                            <rect x="125" y="195" width="50" height="170" fill="#6A0DAD" rx="15"/>
                            <circle cx="150" cy="250" r="20" fill="none" stroke="#FFD700" stroke-width="2"/>`;
                case 'hunter':
                    return `<rect x="120" y="190" width="60" height="180" fill="#228B22" rx="10"/>
                            <rect x="125" y="195" width="50" height="170" fill="#2E8B57" rx="8"/>
                            <path d="M130,250 L150,240 L170,250" stroke="#8B4513" stroke-width="3" fill="none"/>`;
                default:
                    return `<rect x="120" y="190" width="60" height="180" fill="#4a4a4a" rx="20"/>`;
            }
        }
        
        // Функция для волос
        function getHairForStyle() {
            switch(character.hairstyle) {
                case 'long':
                    return `<path d="M115,90 Q150,150 185,90" fill="${character.hairColor}" opacity="0.9"/>
                            <path d="M120,110 L150,200 L180,110" fill="${character.hairColor}" opacity="0.7"/>`;
                case 'medium':
                    return `<path d="M120,95 Q150,130 180,95" fill="${character.hairColor}"/>`;
                case 'ponytail':
                    return `<path d="M125,90 Q150,120 175,90" fill="${character.hairColor}"/>
                            <circle cx="150" cy="140" r="20" fill="${character.hairColor}"/>`;
                case 'braid':
                    return `<path d="M120,90 Q140,100 160,100 Q180,100 180,90" fill="${character.hairColor}"/>
                            <path d="M140,100 L145,150 L155,150 L160,100" fill="${character.hairColor}"/>`;
                default:
                    return `<path d="M125,95 Q150,110 175,95" fill="${character.hairColor}"/>`;
            }
        }
        
        // Функция для оружия
        function getWeaponForType() {
            switch(character.weapon) {
                case 'sword':
                    return `<rect x="200" y="200" width="8" height="100" fill="#C0C0C0"/>
                            <rect x="195" y="180" width="18" height="30" fill="#FFD700"/>`;
                case 'staff':
                    return `<rect x="200" y="150" width="6" height="140" fill="#8B4513"/>
                            <circle cx="203" cy="140" r="15" fill="${character.eyeColor}" opacity="0.7"/>`;
                case 'bow':
                    return `<path d="M200,200 Q220,250 200,300" stroke="#8B4513" stroke-width="5" fill="none"/>
                            <line x1="190" y1="240" x2="210" y2="260" stroke="#8B4513" stroke-width="3"/>`;
                case 'dagger':
                    return `<rect x="200" y="220" width="5" height="70" fill="#C0C0C0"/>
                            <polygon points="195,210 205,210 200,190" fill="#C0C0C0"/>`;
                default:
                    return '';
            }
        }
        
        // Функция для аксессуаров
        function getAccessoryForType() {
            switch(character.accessory) {
                case 'crown':
                    return `<path d="M130,70 L150,40 L170,70" stroke="#FFD700" stroke-width="4" fill="none"/>
                            <circle cx="150" cy="45" r="5" fill="#FFD700"/>`;
                case 'cape':
                    return `<path d="M100,200 Q80,300 100,400" fill="#8B0000" opacity="0.6"/>`;
                case 'jewelry':
                    return `<circle cx="150" cy="100" r="5" fill="#FFD700"/>
                            <circle cx="150" cy="260" r="8" fill="#FFD700"/>`;
                default:
                    return '';
            }
        }
        
        // Обновление характеристик
        function updateStats() {
            let power = 10, strength = 10, magic = 10, agility = 10;
            
            // Бонусы от роли
            switch(character.role) {
                case 'queen':
                    power = 15; strength = 8; magic = 10; agility = 7;
                    break;
                case 'warrior':
                    power = 8; strength = 15; magic = 5; agility = 12;
                    break;
                case 'mage':
                    power = 7; strength = 5; magic = 15; agility = 8;
                    break;
                case 'hunter':
                    power = 6; strength = 10; magic = 8; agility = 15;
                    break;
            }
            
            // Бонусы от оружия
            switch(character.weapon) {
                case 'sword': strength += 3; break;
                case 'staff': magic += 3; break;
                case 'bow': agility += 3; break;
                case 'dagger': agility += 2; strength += 1; break;
            }
            
            // Бонусы от доспехов
            switch(character.armor) {
                case 'royal': power += 3; break;
                case 'battle': strength += 3; break;
                case 'magic': magic += 3; break;
                case 'hunter': agility += 3; break;
            }
            
            // Бонусы от аксессуаров
            switch(character.accessory) {
                case 'crown': power += 2; magic += 2; break;
                case 'cape': agility += 2; strength += 2; break;
                case 'jewelry': magic += 3; power += 1; break;
            }
            
            document.getElementById('statPower').textContent = power;
            document.getElementById('statStrength').textContent = strength;
            document.getElementById('statMagic').textContent = magic;
            document.getElementById('statAgility').textContent = agility;
        }
        
        // Обновление имени
        function updateName() {
            const names = {
                queen: 'Правительница',
                warrior: 'Воительница',
                mage: 'Чародейка',
                hunter: 'Охотница'
            };
            document.getElementById('characterName').textContent = names[character.role];
        }
        
        // Обновление всего UI
        function updateUI() {
            drawCharacter();
            updateStats();
            updateName();
        }
        
        // Инициализация цветовых палитр
        function initColorPalettes() {
            const hairPalette = document.getElementById('hairColorPalette');
            const eyePalette = document.getElementById('eyeColorPalette');
            
            hairColors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = `color-btn ${character.hairColor === color ? 'selected' : ''}`;
                btn.style.backgroundColor = color;
                btn.onclick = () => {
                    document.querySelectorAll('#hairColorPalette .color-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.hairColor = color;
                    updateUI();
                };
                hairPalette.appendChild(btn);
            });
            
            eyeColors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = `color-btn ${character.eyeColor === color ? 'selected' : ''}`;
                btn.style.backgroundColor = color;
                btn.onclick = () => {
                    document.querySelectorAll('#eyeColorPalette .color-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.eyeColor = color;
                    updateUI();
                };
                eyePalette.appendChild(btn);
            });
        }
        
        // Настройка обработчиков кнопок
        function setupButtons() {
            // Роли
            document.querySelectorAll('[data-role]').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('[data-role]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.role = btn.dataset.role;
                    updateUI();
                };
            });
            
            // Прически
            document.querySelectorAll('[data-hairstyle]').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('[data-hairstyle]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.hairstyle = btn.dataset.hairstyle;
                    updateUI();
                };
            });
            
            // Оружие
            document.querySelectorAll('[data-weapon]').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('[data-weapon]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.weapon = btn.dataset.weapon;
                    updateUI();
                };
            });
            
            // Доспехи
            document.querySelectorAll('[data-armor]').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('[data-armor]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.armor = btn.dataset.armor;
                    updateUI();
                };
            });
            
            // Аксессуары
            document.querySelectorAll('[data-accessory]').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('[data-accessory]').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.accessory = btn.dataset.accessory;
                    updateUI();
                };
            });
            
            // Пол
            document.getElementById('genderFemale').onclick = () => {
                document.getElementById('genderFemale').classList.add('selected');
                document.getElementById('genderMale').classList.remove('selected');
                character.gender = 'female';
                updateUI();
            };
            
            document.getElementById('genderMale').onclick = () => {
                document.getElementById('genderMale').classList.add('selected');
                document.getElementById('genderFemale').classList.remove('selected');
                character.gender = 'male';
                updateUI();
            };
            
            // Случайный персонаж
            document.getElementById('randomizeBtn').onclick = () => {
                const roles = ['queen', 'warrior', 'mage', 'hunter'];
                const hairstyles = ['long', 'medium', 'ponytail', 'braid'];
                const weapons = ['sword', 'staff', 'bow', 'dagger'];
                const armors = ['royal', 'battle', 'magic', 'hunter'];
                const accessories = ['none', 'crown', 'cape', 'jewelry'];
                
                character.role = roles[Math.floor(Math.random() * roles.length)];
                character.hairstyle = hairstyles[Math.floor(Math.random() * hairstyles.length)];
                character.hairColor = hairColors[Math.floor(Math.random() * hairColors.length)];
                character.eyeColor = eyeColors[Math.floor(Math.random() * eyeColors.length)];
                character.weapon = weapons[Math.floor(Math.random() * weapons.length)];
                character.armor = armors[Math.floor(Math.random() * armors.length)];
                character.accessory = accessories[Math.floor(Math.random() * accessories.length)];
                
                // Обновляем выделение кнопок
                document.querySelectorAll('.option-btn, .color-btn').forEach(b => b.classList.remove('selected'));
                
                // Находим и выделяем нужные кнопки
                document.querySelector(`[data-role="${character.role}"]`)?.classList.add('selected');
                document.querySelector(`[data-hairstyle="${character.hairstyle}"]`)?.classList.add('selected');
                document.querySelector(`[data-weapon="${character.weapon}"]`)?.classList.add('selected');
                document.querySelector(`[data-armor="${character.armor}"]`)?.classList.add('selected');
                document.querySelector(`[data-accessory="${character.accessory}"]`)?.classList.add('selected');
                
                updateUI();
            };
            
            // Сброс
            document.getElementById('resetBtn').onclick = () => {
                character.role = 'queen';
                character.hairstyle = 'long';
                character.hairColor = '#F4C430';
                character.eyeColor = '#4a90e2';
                character.weapon = 'sword';
                character.armor = 'royal';
                character.accessory = 'none';
                
                document.querySelectorAll('.option-btn, .color-btn').forEach(b => b.classList.remove('selected'));
                
                document.querySelector('[data-role="queen"]').classList.add('selected');
                document.querySelector('[data-hairstyle="long"]').classList.add('selected');
                document.querySelector('[data-weapon="sword"]').classList.add('selected');
                document.querySelector('[data-armor="royal"]').classList.add('selected');
                document.querySelector('[data-accessory="none"]').classList.add('selected');
                
                updateUI();
            };
        }
        
        // Запуск
        initColorPalettes();
        setupButtons();
        updateUI();
    </script>
</body>
</html>
