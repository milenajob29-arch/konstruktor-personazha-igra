<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ BLESS - Конструктор чиби-персонажей ✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #ffd1e4 0%, #ffb5c0 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 240, 245, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 50px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(255, 150, 200, 0.4);
            border: 3px solid white;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 5em;
            background: linear-gradient(135deg, #ff69b4, #ff9f9f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 3px 3px 0 white;
            letter-spacing: 5px;
        }
        
        .header h1 span {
            font-size: 0.5em;
            background: white;
            -webkit-text-fill-color: #ff69b4;
            padding: 0 20px;
            border-radius: 50px;
        }
        
        .subtitle {
            color: #ff69b4;
            font-size: 1.3em;
            font-weight: bold;
            text-shadow: 2px 2px 0 white;
        }
        
        .gender-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .gender-btn {
            padding: 15px 50px;
            font-size: 1.8em;
            border: 4px solid white;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.1);
            box-shadow: 0 10px 0 rgba(0,0,0,0.1);
        }
        
        .gender-btn.female {
            background: linear-gradient(135deg, #ff85b3, #ffb5c0);
        }
        
        .gender-btn.male {
            background: linear-gradient(135deg, #85b3ff, #b5c0ff);
        }
        
        .gender-btn.selected {
            transform: translateY(-5px);
            box-shadow: 0 15px 0 rgba(0,0,0,0.1);
        }
        
        .main-area {
            display: grid;
            grid-template-columns: 280px 1fr 280px;
            gap: 20px;
        }
        
        @media (max-width: 1000px) {
            .main-area {
                grid-template-columns: 1fr;
            }
        }
        
        .panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            border-radius: 40px;
            padding: 20px;
            border: 4px solid white;
            box-shadow: 0 10px 0 rgba(255, 105, 180, 0.3);
        }
        
        .panel h2 {
            color: #ff69b4;
            font-size: 1.8em;
            margin-bottom: 20px;
            border-bottom: 4px dotted #ffb5c0;
            padding-bottom: 10px;
            text-shadow: 2px 2px 0 white;
        }
        
        .character-display {
            background: linear-gradient(135deg, #ffe6f0, #fff0f5);
            border-radius: 60px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 6px solid white;
            box-shadow: 0 20px 0 #ffb5c0;
        }
        
        .character-canvas {
            width: 100%;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 40px;
        }
        
        .character-svg {
            max-width: 100%;
            max-height: 100%;
        }
        
        .character-name {
            font-size: 2.5em;
            margin-top: 20px;
            color: #ff69b4;
            text-shadow: 3px 3px 0 white;
            background: white;
            padding: 10px 40px;
            border-radius: 60px;
            border: 4px solid #ffb5c0;
            font-weight: bold;
        }
        
        .option-section {
            margin-bottom: 25px;
        }
        
        .option-section h3 {
            color: #ff69b4;
            margin-bottom: 10px;
            font-size: 1.3em;
            text-shadow: 1px 1px 0 white;
        }
        
        .option-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .option-btn {
            background: white;
            border: 3px solid #ffb5c0;
            color: #ff69b4;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1em;
            font-weight: bold;
            box-shadow: 0 5px 0 #ffb5c0;
        }
        
        .option-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #ff69b4;
        }
        
        .option-btn.selected {
            background: #ff69b4;
            border-color: white;
            color: white;
            box-shadow: 0 5px 0 #ff3388;
        }
        
        .color-palette {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 20px;
            border: 4px solid white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
        }
        
        .color-btn:hover {
            transform: scale(1.2) rotate(5deg);
        }
        
        .color-btn.selected {
            border-color: #ff69b4;
            transform: scale(1.1);
        }
        
        .stats-panel {
            background: white;
            border-radius: 30px;
            padding: 20px;
            margin-top: 20px;
            border: 4px solid #ffb5c0;
        }
        
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 15px;
            background: #fff0f5;
            border-radius: 30px;
            border: 2px solid #ffb5c0;
        }
        
        .stat-name {
            color: #ff69b4;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .stat-value {
            color: white;
            background: #ff69b4;
            padding: 2px 15px;
            border-radius: 30px;
            font-weight: bold;
        }
        
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }
        
        .action-btn {
            padding: 15px;
            border: none;
            border-radius: 40px;
            background: #ff85b3;
            color: white;
            font-weight: bold;
            font-size: 1.2em;
            cursor: pointer;
            transition: 0.2s;
            border: 4px solid white;
            box-shadow: 0 8px 0 #ff3388;
        }
        
        .action-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 13px 0 #ff3388;
        }
        
        .action-btn.secondary {
            background: #b5c0ff;
            box-shadow: 0 8px 0 #8590cc;
        }
        
        /* Чиби-стикеры */
        .sticker {
            position: absolute;
            font-size: 2em;
            opacity: 0.3;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BLESS <span>✨</span></h1>
            <div class="subtitle">милые чиби-героини твоей мечты</div>
        </div>
        
        <div class="gender-selector">
            <button class="gender-btn female selected" id="genderFemale">👸 Девочка</button>
            <button class="gender-btn male" id="genderMale">👦 Мальчик</button>
        </div>
        
        <div class="main-area">
            <!-- Левая панель - Внешность -->
            <div class="panel">
                <h2>🎀 Внешность</h2>
                
                <div class="option-section">
                    <h3>Тип героини</h3>
                    <div class="option-buttons" id="roleButtons">
                        <button class="option-btn selected" data-role="princess">👑 Принцесса</button>
                        <button class="option-btn" data-role="mage">✨ Чародейка</button>
                        <button class="option-btn" data-role="warrior">⚔️ Воин</button>
                        <button class="option-btn" data-role="hunter">🏹 Лучница</button>
                        <button class="option-btn" data-role="angel">😇 Ангел</button>
                    </div>
                </div>
                
                <div class="option-section">
                    <h3>Прическа</h3>
                    <div class="option-buttons" id="hairstyleButtons">
                        <button class="option-btn selected" data-hairstyle="long">Длинные</button>
                        <button class="option-btn" data-hairstyle="twintails">Хвостики</button>
                        <button class="option-btn" data-hairstyle="short">Короткие</button>
                        <button class="option-btn" data-hairstyle="braid">Коса</button>
                        <button class="option-btn" data-hairstyle="bob">Каре</button>
                    </div>
                </div>
                
                <div class="option-section">
                    <h3>Цвет волос</h3>
                    <div class="color-palette" id="hairColorPalette"></div>
                </div>
                
                <div class="option-section">
                    <h3>Цвет глаз</h3>
                    <div class="color-palette" id="eyeColorPalette"></div>
                </div>
                
                <div class="option-section">
                    <h3>Выражение лица</h3>
                    <div class="option-buttons" id="faceButtons">
                        <button class="option-btn selected" data-face="happy">😊 Улыбка</button>
                        <button class="option-btn" data-face="wink">😉 Подмигивание</button>
                        <button class="option-btn" data-face="heart">😍 Сердечки</button>
                        <button class="option-btn" data-face="star">✨ Звездочки</button>
                    </div>
                </div>
            </div>
            
            <!-- Центр - Персонаж -->
            <div class="character-display">
                <div class="character-canvas">
                    <svg class="character-svg" viewBox="0 0 300 450" id="characterSVG">
                        <!-- Чиби-персонаж будет здесь -->
                    </svg>
                </div>
                <div class="character-name" id="characterName">✨ Принцесса ✨</div>
            </div>
            
            <!-- Правая панель - Снаряжение -->
            <div class="panel">
                <h2>⭐ Снаряжение</h2>
                
                <div class="option-section">
                    <h3>Оружие/Аксессуар</h3>
                    <div class="option-buttons" id="weaponButtons">
                        <button class="option-btn selected" data-weapon="wand">✨ Волшебная палочка</button>
                        <button class="option-btn" data-weapon="staff">🔮 Посох</button>
                        <button class="option-btn" data-weapon="bow">🏹 Лук</button>
                        <button class="option-btn" data-weapon="sword">⚔️ Меч</button>
                        <button class="option-btn" data-weapon="heart">💖 Сердечко</button>
                    </div>
                </div>
                
                <div class="option-section">
                    <h3>Наряд</h3>
                    <div class="option-buttons" id="outfitButtons">
                        <button class="option-btn selected" data-outfit="princess">👗 Платье</button>
                        <button class="option-btn" data-outfit="magic">✨ Магическое</button>
                        <button class="option-btn" data-outfit="armor">🛡️ Доспехи</button>
                        <button class="option-btn" data-outfit="santa">🎄 Праздничное</button>
                    </div>
                </div>
                
                <div class="option-section">
                    <h3>Головной убор</h3>
                    <div class="option-buttons" id="hatButtons">
                        <button class="option-btn selected" data-hat="none">🚫 Нет</button>
                        <button class="option-btn" data-hat="crown">👑 Корона</button>
                        <button class="option-btn" data-hat="ribbon">🎀 Бантик</button>
                        <button class="option-btn" data-hat="witchhat">🧙 Шляпа</button>
                        <button class="option-btn" data-hat="flowers">🌸 Цветы</button>
                    </div>
                </div>
                
                <div class="option-section">
                    <h3>Эффекты</h3>
                    <div class="option-buttons" id="effectButtons">
                        <button class="option-btn selected" data-effect="none">Нет</button>
                        <button class="option-btn" data-effect="sparkles">✨ Блестки</button>
                        <button class="option-btn" data-effect="hearts">💖 Сердечки</button>
                        <button class="option-btn" data-effect="stars">⭐ Звезды</button>
                        <button class="option-btn" data-effect="flowers">🌸 Цветочки</button>
                    </div>
                </div>
                
                <!-- Характеристики (в милом стиле) -->
                <div class="stats-panel">
                    <h3 style="color: #ff69b4; margin-bottom: 10px;">🌟 Характеристики</h3>
                    <div class="stat-row">
                        <span class="stat-name">✨ Милота</span>
                        <span class="stat-value" id="statCute">100</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">💖 Магия</span>
                        <span class="stat-value" id="statMagic">95</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">⭐ Сила</span>
                        <span class="stat-value" id="statPower">90</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-name">🎀 Стиль</span>
                        <span class="stat-value" id="statStyle">100</span>
                    </div>
                </div>
                
                <!-- Кнопки -->
                <div class="action-buttons">
                    <button class="action-btn" id="randomizeBtn">🎲 Случайная</button>
                    <button class="action-btn secondary" id="resetBtn">🔄 Сброс</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Состояние персонажа
        const character = {
            gender: 'female',
            role: 'princess',
            hairstyle: 'long',
            hairColor: '#F4C430', // золотистый
            eyeColor: '#4a90e2', // голубой
            face: 'happy',
            weapon: 'wand',
            outfit: 'princess',
            hat: 'none',
            effect: 'none'
        };
        
        // Цвета
        const hairColors = [
            '#F4C430', // золотистый
            '#8B4513', // каштановый
            '#2C2C2C', // черный
            '#D2691E', // рыжий
            '#FF69B4', // розовый
            '#9370DB', // фиолетовый
            '#4169E1', // синий
            '#C0C0C0', // серебро
            '#FFD700', // золото
            '#98FB98'  // мятный
        ];
        
        const eyeColors = [
            '#4a90e2', // голубой
            '#32CD32', // зеленый
            '#8B4513', // карий
            '#9370DB', // фиолетовый
            '#FF69B4', // розовый
            '#FFD700', // золотой
            '#DC143C'  // красный
        ];
        
        // Функция отрисовки чиби-персонажа
        function drawCharacter() {
            const svg = document.getElementById('characterSVG');
            
            // Цвета
            const skinColor = '#FFE0C0';
            const hairColor = character.hairColor;
            const eyeColor = character.eyeColor;
            
            let svgContent = `
                <!-- Чиби-персонаж в стиле BLESS -->
                <defs>
                    <filter id="glow">
                        <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    
                    <!-- Градиенты для милоты -->
                    <radialGradient id="skinGradient">
                        <stop offset="0%" stop-color="${skinColor}"/>
                        <stop offset="100%" stop-color="#FFD0A0"/>
                    </radialGradient>
                    
                    <radialGradient id="cheekGradient">
                        <stop offset="0%" stop-color="#FFB6C1" stop-opacity="0.5"/>
                        <stop offset="100%" stop-color="#FFB6C1" stop-opacity="0"/>
                    </radialGradient>
                </defs>
            `;
            
            // Эффекты (фон)
            if (character.effect !== 'none') {
                svgContent += getEffect(character.effect);
            }
            
            // Тело чиби (большая голова, маленькое тело)
            svgContent += `
                <!-- Тело -->
                <ellipse cx="150" cy="320" rx="50" ry="60" fill="${getOutfitColor()}" filter="url(#glow)"/>
                
                <!-- Голова (большая) -->
                <circle cx="150" cy="180" r="90" fill="url(#skinGradient)" stroke="white" stroke-width="4"/>
                
                <!-- Уши (для милоты) -->
                <circle cx="80" cy="150" r="15" fill="url(#skinGradient)" stroke="white" stroke-width="2"/>
                <circle cx="220" cy="150" r="15" fill="url(#skinGradient)" stroke="white" stroke-width="2"/>
                
                <!-- Румянец на щечках -->
                <circle cx="110" cy="210" r="20" fill="url(#cheekGradient)"/>
                <circle cx="190" cy="210" r="20" fill="url(#cheekGradient)"/>
            `;
            
            // Волосы
            svgContent += getHairstyle(character.hairstyle, hairColor);
            
            // Глаза (большие, аниме-стиль)
            svgContent += getEyes(character.face, eyeColor);
            
            // Рот и выражение лица
            svgContent += getMouth(character.face);
            
            // Одежда/наряд
            svgContent += getOutfit(character.outfit);
            
            // Оружие/аксессуар в руке
            svgContent += getWeapon(character.weapon);
            
            // Головной убор
            if (character.hat !== 'none') {
                svgContent += getHat(character.hat);
            }
            
            // Брови (милые)
            svgContent += `
                <!-- Брови -->
                <path d="M100,160 L130,150" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>
                <path d="M200,160 L170,150" stroke="#8B4513" stroke-width="4" fill="none" stroke-linecap="round"/>
            `;
            
            svg.innerHTML = svgContent;
        }
        
        // Функции для отрисовки разных частей
        function getHairstyle(style, color) {
            switch(style) {
                case 'long':
                    return `<path d="M90,100 Q150,150 210,100" fill="${color}" opacity="0.9"/>
                            <path d="M100,120 L150,250 L200,120" fill="${color}" opacity="0.8"/>`;
                case 'twintails':
                    return `<circle cx="100" cy="120" r="30" fill="${color}"/>
                            <circle cx="200" cy="120" r="30" fill="${color}"/>`;
                case 'short':
                    return `<path d="M100,100 Q150,130 200,100" fill="${color}"/>`;
                case 'braid':
                    return `<path d="M110,100 Q130,120 150,130 Q170,120 190,100" fill="${color}"/>`;
                case 'bob':
                    return `<rect x="100" y="90" width="100" height="40" rx="20" fill="${color}"/>`;
                default:
                    return `<path d="M90,100 Q150,140 210,100" fill="${color}"/>`;
            }
        }
        
        function getEyes(face, color) {
            const baseEyes = `
                <!-- Большие глаза -->
                <ellipse cx="110" cy="190" rx="20" ry="25" fill="white" stroke="#8B4513" stroke-width="2"/>
                <ellipse cx="190" cy="190" rx="20" ry="25" fill="white" stroke="#8B4513" stroke-width="2"/>
                
                <!-- Зрачки -->
                <circle cx="110" cy="195" r="12" fill="${color}"/>
                <circle cx="190" cy="195" r="12" fill="${color}"/>
                
                <!-- Блики -->
                <circle cx="100" cy="185" r="4" fill="white"/>
                <circle cx="180" cy="185" r="4" fill="white"/>
            `;
            
            switch(face) {
                case 'wink':
                    return baseEyes.replace('190', '185').replace('190', '185') + 
                           `<path d="M190,190 L210,180" stroke="black" stroke-width="3"/>`;
                case 'heart':
                    return baseEyes + `
                        <text x="140" y="140" font-size="30" fill="#ff69b4">❤️</text>
                    `;
                case 'star':
                    return baseEyes + `
                        <text x="140" y="140" font-size="30" fill="#FFD700">✨</text>
                    `;
                default:
                    return baseEyes;
            }
        }
        
        function getMouth(face) {
            switch(face) {
                case 'happy':
                    return `<path d="M130,240 Q150,260 170,240" stroke="black" stroke-width="4" fill="none" stroke-linecap="round"/>`;
                case 'wink':
                    return `<path d="M130,240 Q150,255 170,240" stroke="black" stroke-width="4" fill="none"/>`;
                default:
                    return `<path d="M130,240 Q150,250 170,240" stroke="black" stroke-width="4" fill="none"/>`;
            }
        }
        
        function getOutfit(type) {
            switch(type) {
                case 'princess':
                    return `<rect x="120" y="280" width="60" height="80" fill="#FFB6C1" rx="20"/>
                            <circle cx="150" cy="300" r="15" fill="#FF69B4"/>`;
                case 'magic':
                    return `<rect x="120" y="280" width="60" height="80" fill="#9370DB" rx="20"/>
                            <path d="M150,280 L170,260 L150,300" fill="#FFD700"/>`;
                case 'armor':
                    return `<rect x="120" y="280" width="60" height="80" fill="#C0C0C0" rx="10"/>
                            <rect x="130" y="290" width="40" height="20" fill="#FFD700"/>`;
                default:
                    return `<rect x="120" y="280" width="60" height="80" fill="#98FB98" rx="20"/>`;
            }
        }
        
        function getOutfitColor() {
            switch(character.outfit) {
                case 'princess': return '#FFB6C1';
                case 'magic': return '#9370DB';
                case 'armor': return '#C0C0C0';
                default: return '#98FB98';
            }
        }
        
        function getWeapon(type) {
            switch(type) {
                case 'wand':
                    return `<line x1="230" y1="200" x2="260" y2="150" stroke="#FFD700" stroke-width="5"/>
                            <circle cx="265" cy="145" r="10" fill="#FF69B4"/>`;
                case 'staff':
                    return `<rect x="230" y="180" width="8" height="100" fill="#8B4513"/>
                            <circle cx="234" cy="170" r="15" fill="#9370DB"/>`;
                case 'bow':
                    return `<path d="M220,200 Q240,220 220,240" stroke="#8B4513" stroke-width="5" fill="none"/>`;
                case 'sword':
                    return `<rect x="230" y="190" width="6" height="80" fill="#C0C0C0"/>
                            <polygon points="230,170 236,170 233,150" fill="#C0C0C0"/>`;
                case 'heart':
                    return `<text x="230" y="200" font-size="40">💖</text>`;
                default:
                    return '';
            }
        }
        
        function getHat(type) {
            switch(type) {
                case 'crown':
                    return `<path d="M120,60 L150,30 L180,60" stroke="#FFD700" stroke-width="6" fill="none"/>
                            <circle cx="150" cy="35" r="8" fill="#FFD700"/>`;
                case 'ribbon':
                    return `<rect x="130" y="70" width="40" height="15" fill="#FF69B4" rx="7"/>
                            <rect x="140" y="60" width="20" height="20" fill="#FF69B4" rx="5"/>`;
                case 'witchhat':
                    return `<polygon points="120,70 180,70 150,30" fill="#2C2C2C"/>

                case 'flowers':

                default:
                    return '';
            }
        }

        // Инициализация цветовых палитр
        function initColorPalettes() {
            const hairPalette = document.getElementById('hairColorPalette');
            const eyePalette = document.getElementById('eyeColorPalette');
            
            hairColors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = `color-btn ${character.hairColor === color ? 'selected' : ''}`;
                btn.style.backgroundColor = color;
                btn.onclick = () => {
                    document.querySelectorAll('#hairColorPalette .color-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.hairColor = color;
                    updateUI();
                };
                hairPalette.appendChild(btn);

            eyeColors.forEach(color => {
                const btn = document.createElement('button');
                btn.className = `color-btn ${character.eyeColor === color ? 'selected' : ''}`;
                btn.style.backgroundColor = color;
                btn.onclick = () => {
                    document.querySelectorAll('#eyeColorPalette .color-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    character.eyeColor = color;
                    updateUI();
                };
                eyePalette.appendChild(btn);
            });
        }
